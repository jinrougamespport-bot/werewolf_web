<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>人狼ロビー - ダッシュボード</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background-color: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .lobby-box { background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px; text-align: center; width: 300px; border: 2px solid #34495e; }
        .stats { margin: 20px 0; border: 1px solid #555; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); }
        .enter-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .enter-btn:hover { background: #2ecc71; }
    </style>
</head>
<body>
    <div class="lobby-box">
        <h2>ようこそ！ <span id="display-name"></span> さん</h2>
        <div class="stats">
            <p>🏆 勝利: <span id="user-wins">0</span></p>
            <p>💀 敗北: <span id="user-losses">0</span></p>
        </div>
        <button class="enter-btn" onclick="enterVillage()">村に参加する（ゲーム開始）</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        document.getElementById('display-name').innerText = name;
        document.getElementById('user-wins').innerText = params.get('wins') || 0;
        document.getElementById('user-losses').innerText = params.get('losses') || 0;

        function enterVillage() {
            // ゲーム画面へ名前を引き継いで移動
            window.location.href = "/game?name=" + encodeURIComponent(name);
        }
    </script>
</body>
</html>
